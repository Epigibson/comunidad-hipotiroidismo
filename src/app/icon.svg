<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="tiroGradient" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#8b5cf6" />
      <stop offset="50%" stop-color="#d946ef" />
      <stop offset="100%" stop-color="#4f46e5" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background Base (Transparent, relying on paths) -->
  
  <!-- Central Body (Thorax) -->
  <rect x="246" y="150" width="20" height="212" rx="10" fill="url(#tiroGradient)" filter="url(#glow)"/>
  
  <!-- Left Wing Top -->
  <path d="M236 210 C150 150 60 120 40 200 C30 240 100 280 236 260 Z" fill="url(#tiroGradient)" filter="url(#glow)" opacity="0.9"/>
  <!-- Left Wing Bottom -->
  <path d="M236 270 C120 300 80 400 120 450 C150 480 210 380 236 330 Z" fill="url(#tiroGradient)" filter="url(#glow)" opacity="0.75"/>

  <!-- Right Wing Top -->
  <path d="M276 210 C362 150 452 120 472 200 C482 240 412 280 276 260 Z" fill="url(#tiroGradient)" filter="url(#glow)" opacity="0.9"/>
  <!-- Right Wing Bottom -->
  <path d="M276 270 C392 300 432 400 392 450 C362 480 302 380 276 330 Z" fill="url(#tiroGradient)" filter="url(#glow)" opacity="0.75"/>
</svg>
